<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Slider</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Ionicons for the interface icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body class="bg-white p-4 md:p-8 flex justify-center items-center min-h-screen">

  <!-- Slider Wrapper -->
  <div class="w-full max-w-5xl mx-auto flex flex-col gap-6">
    
    <!-- Top Tags (As seen in image_83cfc7.jpg) -->
    <div class="flex gap-2 text-xs font-semibold">
      <span class="bg-black text-white px-3 py-1 rounded-full">Landing Page</span>
      <span class="bg-black text-white px-3 py-1 rounded-full">Responsive</span>
    </div>

    <!-- Main Slide Display Image Window -->
    <div class="relative w-full aspect-[16/10] md:aspect-[16/9] rounded-xl overflow-hidden shadow-lg bg-gray-100">
      <img id="slide-img" src="https://via.placeholder.com/1200x750?text=Slide+1" alt="Project Image" class="w-full h-full object-cover transition-all duration-500">
      
      <!-- Bottom Content Overlay (Gradient + Header + Inline Buttons) -->
      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4 md:p-8 pt-20 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        
        <!-- Left Side: Dynamic Heading & Action Buttons -->
        <div class="flex items-center gap-4 flex-wrap">
          <h2 id="slide-title" class="text-white text-xl md:text-3xl font-light tracking-wide">Automotive Battery Vent</h2>
          <div class="flex gap-2">
            <a id="slide-link" href="#" class="w-10 h-10 rounded-full border border-white/60 flex items-center justify-center text-white hover:bg-white/20 transition">
              <ion-icon name="arrow-up-outline" class="rotate-45 text-lg"></ion-icon>
            </a>
            <a id="slide-whatsapp" href="#" class="w-10 h-10 rounded-full border border-white/60 flex items-center justify-center text-white hover:bg-white/20 transition">
              <ion-icon name="logo-whatsapp" class="text-lg"></ion-icon>
            </a>
          </div>
        </div>

        <!-- Right Side: Mini Slider Prev/Next Controls inside image -->
        <div class="flex gap-2 self-end md:self-auto">
          <button onclick="prevSlide()" class="w-10 h-10 rounded-full border border-white/40 flex items-center justify-center text-white hover:bg-white/20 transition cursor-pointer">
            <ion-icon name="chevron-back-outline"></ion-icon>
          </button>
          <button onclick="nextSlide()" class="w-10 h-10 rounded-full border border-white/40 flex items-center justify-center text-white hover:bg-white/20 transition cursor-pointer">
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Time Bar / Progress Line -->
    <div class="w-full h-[2px] bg-gray-200 relative rounded-full">
      <div id="progress-bar" class="absolute top-0 left-0 h-full bg-black transition-all linear duration-100" style="width: 0%;"></div>
    </div>

    <!-- Bottom Pagination Block (e.g., 9 / 56 Controls) -->
    <div class="flex justify-center">
      <div class="bg-zinc-900 text-white rounded-lg flex items-center px-4 py-2 gap-4 text-sm font-medium shadow-md">
        <button onclick="prevSlide()" class="hover:text-gray-400 transition cursor-pointer"><ion-icon name="chevron-back-outline"></ion-icon></button>
        <span id="slide-counter" class="tracking-widest">1 / 3</span>
        <button onclick="nextSlide()" class="hover:text-gray-400 transition cursor-pointer"><ion-icon name="chevron-forward-outline"></ion-icon></button>
      </div>
    </div>

  </div>

  <!-- Shared Slider Logic -->
  <script>
    const slides = [
      {
        img: "D:/Arslan website/assets/images/REUTIB.png",
        title: "Automotive Battery Vent",
        link: "#project1",
        wa: "https://wa.me/123456789"
      },
      {
        img: "https://via.placeholder.com/1200x750?text=Slide+2+E-Commerce+App",
        title: "NextGen E-Commerce UI",
        link: "#project2",
        wa: "https://wa.me/987654321"
      },
      {
        img: "https://via.placeholder.com/1200x750?text=Slide+3+Fintech+Dashboard",
        title: "SaaS Analytics Platform",
        link: "#project3",
        wa: "https://wa.me/112233445"
      }
    ];

    let currentIndex = 0;
    const duration = 5000; // Time per slide in ms
    let startTime = Date.now();
    let timerInterval;

    function updateSlider() {
      const current = slides[currentIndex];
      document.getElementById('slide-img').src = current.img;
      document.getElementById('slide-title').innerText = current.title;
      document.getElementById('slide-link').href = current.link;
      document.getElementById('slide-whatsapp').href = current.wa;
      document.getElementById('slide-counter').innerText = `${currentIndex + 1} / ${slides.length}`;
      startTime = Date.now(); // reset progress timer
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % slides.length;
      updateSlider();
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      updateSlider();
    }

    // Handles the smooth frame-by-frame progress bar filling
    function animateProgressBar() {
      timerInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        let percentage = (elapsed / duration) * 100;
        
        if (percentage >= 100) {
          percentage = 0;
          nextSlide();
        }
        document.getElementById('progress-bar').style.width = `${percentage}%`;
      }, 30);
    }

    // Initialize
    updateSlider();
    animateProgressBar();
  </script>
</body>
</html>
